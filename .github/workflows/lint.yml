name: Lint & Format

on:
  push:
    branches: ["master"]
  pull_request:
    paths:
      - "src/**"
      - ".github/workflows/lint.yml"

jobs:
  lint:
    name: TypeScript & Code Quality
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      
      - run: bun install
      
      # Note: TypeScript type checking is skipped due to dependency issues.
      # The build script works correctly for the plugin code itself.

  build:
    name: Build verification
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4
      
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      
      - run: bun install
      
      - name: Verify build succeeds
        # Uses tsconfig.json (noEmit: true) for type checking without emitting output
        run: bun tsc --noEmit
