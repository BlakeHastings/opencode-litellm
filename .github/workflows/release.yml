name: Release

on:
  push:
    branches: [main, master]
    tags: ["v*"]
  pull_request:
  workflow_dispatch:
    inputs:
      publish_type:
        description: "What to publish"
        required: true
        type: choice
        options:
          - prerelease
          - stable
      pr_number:
        description: "PR number (required when publishing a prerelease manually)"
        required: false
        type: string

jobs:
  publish-prerelease:
    name: Publish pre-release
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request' || (github.event_name == 'workflow_dispatch' && inputs.publish_type == 'prerelease')
    permissions:
      contents: read
      pull-requests: write
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          registry-url: "https://registry.npmjs.org"

      - run: bun install

      # Version: 0.1.0-pr.{pr_number}.{run_number}
      - name: Set pre-release version
        run: |
          VERSION=$(node -p "require('./package.json').version")
          PR_NUMBER=${{ github.event.pull_request.number || inputs.pr_number }}
          PRERELEASE="${VERSION}-pr.${PR_NUMBER}.${{ github.run_number }}"
          npm version "$PRERELEASE" --no-git-tag-version
          echo "PRERELEASE_VERSION=$PRERELEASE" >> $GITHUB_ENV
          echo "PR_NUMBER=${PR_NUMBER}" >> $GITHUB_ENV

      - name: Publish pre-release to npm
        run: npm publish --access public --tag pr-${{ env.PR_NUMBER }}
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Comment pre-release version on PR
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const marker = '<!-- opencode-litellm:prerelease-comment -->'
            const body = `${marker}\n📦 Pre-release published: \`opencode-litellm@${{ env.PRERELEASE_VERSION }}\`\n\nTest it with:\n\`\`\`json\n{ "plugin": ["opencode-litellm@pr-${{ env.PR_NUMBER }}"] }\n\`\`\``

            const { owner, repo } = context.repo
            const issue_number = context.issue.number

            const comments = await github.paginate(github.rest.issues.listComments, {
              owner, repo, issue_number, per_page: 100,
            })
            const existing = comments.find((c) => c.body?.includes(marker))

            if (existing) {
              await github.rest.issues.updateComment({ owner, repo, comment_id: existing.id, body })
            } else {
              await github.rest.issues.createComment({ owner, repo, issue_number, body })
            }

  integration-prerelease:
    name: Integration test pre-release
    runs-on: ubuntu-latest
    needs: publish-prerelease
    if: (github.event_name == 'pull_request' || (github.event_name == 'workflow_dispatch' && inputs.publish_type == 'prerelease')) && vars.LITELLM_URL != ''
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          registry-url: "https://registry.npmjs.org"

      # Install the published pre-release into a fresh OpenCode-like context
      - name: Install pre-release plugin
        run: |
          mkdir -p test-install
          cd test-install
          npm init -y
          npm install "opencode-litellm@pr-${{ env.PR_NUMBER }}" --save
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      # Run the tests directly (already cover plugin loading + model discovery)
      - name: Run integration tests against pre-release
        run: bun test
        env:
          LITELLM_URL: ${{ vars.LITELLM_URL }}

  publish-stable:
    name: Publish stable release
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v') || (github.event_name == 'workflow_dispatch' && inputs.publish_type == 'stable')
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          registry-url: "https://registry.npmjs.org"

      - run: bun install
      - run: npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
